# ============================================================================
# macOS Shortcuts — kitty as thin host for Zellij
# ============================================================================

# Both Option keys act as Alt (for Neovim, Zellij keybindings, etc.)
macos_option_as_alt both

# ============================================================================
# Essentials
# ============================================================================
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard
map cmd+plus change_font_size all +1.0
map cmd+minus change_font_size all -1.0
map cmd+0 change_font_size all 0
map cmd+enter toggle_fullscreen
map cmd+k clear_terminal clear active
map cmd+n new_os_window

# ============================================================================
# URL hints
# ============================================================================
map cmd+shift+u kitten hints --hints-foreground-color red --hints-background-color white --hints-text-color black
map cmd+shift+o kitten hints --type path
mouse_map cmd+left click ungrabbed mouse_handle_click link

# ============================================================================
# Reload config
# ============================================================================
map ctrl+shift+r load_config_file

# ============================================================================
# Unicode input
# ============================================================================
map cmd+ctrl+space kitten unicode_input
