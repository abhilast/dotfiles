# ============================================================================
# Non-Retina Display Profile
# Optimized for 1080p external monitors (e.g., Arzopa) at 1x scaling
#
# Usage:
#   kitty -o "include non-retina.conf"
#   OR create an OS-level launch shortcut / shell alias
# ============================================================================

# --- Font ---
# Smaller size since 1x renders at physical pixels (no 2x backing)
font_size        13.0

# Boost contrast for non-retina: thicker strokes render better on low-DPI
# Format: <platform_size_threshold> <contrast_level 1-50>
text_composition_strategy 1.0 30

# Tighter line/cell spacing to maximize screen real estate on 1080p
modify_font cell_height 115%
modify_font cell_width 100%

# --- Window ---
# Reduce padding — every pixel counts at 1080p
window_padding_width 1 2
single_window_padding_width 4

# --- Performance ---
# Non-retina pushes fewer pixels; can afford slightly faster repaints
repaint_delay 6
