# ============================================================================
# Kitty Terminal Configuration
# Optimized for Claude Code usage with system theme matching
# ============================================================================

# ============================================================================
# Font
# ============================================================================
font_family      family="JetBrainsMono Nerd Font Mono" style=Medium
bold_font        family="JetBrainsMono Nerd Font Mono" style=Bold
italic_font      auto
bold_italic_font auto
font_size        15.0
disable_ligatures never
font_features    JetBrainsMonoNerdFontMono-Regular +zero +cv14
text_composition_strategy 1.3 5
text_fg_override_threshold 0
modify_font cell_height 125%
modify_font cell_width 101%

# ============================================================================
# Cursor
# ============================================================================
cursor_shape block
cursor_blink_interval 0.5
cursor_stop_blinking_after 10.0
cursor_trail 1
cursor_trail_decay 0.1 0.2

# ============================================================================
# Scrollback
# ============================================================================
scrollback_lines 50000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 10
scrollback_fill_enlarged_window yes
pixel_scroll yes

# ============================================================================
# Mouse
# ============================================================================
mouse_hide_wait 3.0
copy_on_select yes
strip_trailing_spaces smart
select_by_word_characters @-./_~?&=%+#

# ============================================================================
# URLs
# ============================================================================
url_style curly
detect_urls yes
open_url_with default
url_prefixes file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh

# ============================================================================
# Clipboard
# ============================================================================
clipboard_control write-clipboard write-primary read-clipboard read-primary
clipboard_max_size 64
paste_actions confirm

# ============================================================================
# Performance
# ============================================================================
repaint_delay 8
input_delay 2
sync_to_monitor yes
update_check_interval 0

# ============================================================================
# Bell
# ============================================================================
enable_audio_bell no
visual_bell_duration 0.1
visual_bell_color #cc6666
window_alert_on_bell yes
bell_on_tab "🔔 "
notify_on_cmd_finish unfocused 30.0

# ============================================================================
# Window
# ============================================================================
remember_window_size yes
initial_window_width 640
initial_window_height 400
remember_window_position yes
confirm_os_window_close -1
window_border_width 1pt
draw_minimal_borders yes
active_border_color #ff8800
inactive_border_color #664400
inactive_text_alpha 0.6
window_margin_width 0
single_window_margin_width 0
window_padding_width 2 4

# ============================================================================
# Tab Bar
# ============================================================================
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_edge top
tab_bar_min_tabs 1
tab_title_template "{bell_symbol}{activity_symbol}{index}: {title}"
active_tab_font_style bold
inactive_tab_font_style normal

# ============================================================================
# Layout
# ============================================================================
enabled_layouts splits,stack,tall,fat,horizontal,vertical,grid
layout splits

# ============================================================================
# Shell
# ============================================================================
shell_integration enabled no-sudo
allow_remote_control socket-only
listen_on unix:/tmp/kitty-{kitty_pid}
forward_stdin_to_child yes
unicode_normalization yes
term xterm-256color
scrollbar never
single_window_padding_width 8

# ============================================================================
# macOS
# ============================================================================
macos_traditional_fullscreen no

# ============================================================================
# Keyboard
# ============================================================================
map ctrl+shift+r load_config_file

# ============================================================================
# Includes
# ============================================================================
include macos-shortcuts.conf
